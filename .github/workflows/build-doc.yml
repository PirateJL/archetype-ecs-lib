name: Build Documentation

on:
  workflow_run:
    workflows: ["Test"]
    types: [completed]

permissions:
  contents: write
  actions: read

concurrency:
  group: gh-pages
  cancel-in-progress: true

jobs:
  deploy-preview:
    if: >
      github.event_name == 'workflow_run' &&
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'master' &&
      github.event.workflow_run.head_repository.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout master
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - name: Download docs-changed flag
        uses: actions/download-artifact@v4
        with:
          name: docs-changed
          path: ./
          run-id: ${{ github.event.workflow_run.id }}
          repository: ${{ github.repository }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Read docs-changed flag
        id: docsflag
        run: |
          DOCS_CHANGED="$(cat docs_changed.txt || echo false)"
          echo "docs_changed=$DOCS_CHANGED" >> "$GITHUB_OUTPUT"
          echo "DOCS_CHANGED=$DOCS_CHANGED" >> "$GITHUB_ENV"

      - name: Skip (no docs changes)
        if: env.DOCS_CHANGED != 'true'
        run: echo "No docs changes detected; skipping docs build & deploy."

      - name: Check docs vs latest tag
        if: env.DOCS_CHANGED == 'true'
        run: |
          LATEST_TAG="$(git describe --tags --abbrev=0 2>/dev/null || echo '')"
          if [[ -z "$LATEST_TAG" ]]; then
            echo "No tags found; preview will be built."
            exit 0
          fi
          if git diff --quiet "${LATEST_TAG}" HEAD -- docs/ mkdocs.yml; then
            echo "Docs are identical to ${LATEST_TAG}; skipping preview build."
            echo "DOCS_CHANGED=false" >> "$GITHUB_ENV"
          else
            echo "Docs differ from ${LATEST_TAG}; preview will be built."
          fi

      - name: Download coverage badge from triggering run
        if: env.DOCS_CHANGED == 'true'
        uses: actions/download-artifact@v4
        with:
          name: coverage-badge
          path: docs/assets/
          run-id: ${{ github.event.workflow_run.id }}
          repository: ${{ github.repository }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        if: env.DOCS_CHANGED == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install mkdocs + plugins
        if: env.DOCS_CHANGED == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-docs.txt

      - name: Configure git for mike
        if: env.DOCS_CHANGED == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Deploy preview docs
        if: env.DOCS_CHANGED == 'true'
        run: |
          export PDF_LINK="/archetype-ecs-lib/preview/assets/document.pdf"
          export EDIT_URI="blob/master/"
          export ENABLE_PDF_EXPORT=1
          mike deploy --push preview
          if ! mike list 2>/dev/null | grep -q '\blatest\b'; then
            echo "No 'latest' release found; setting 'preview' as default."
            mike set-default --push preview
          fi
