name: Publish library package

on:
  push:
    tags:
      - "v*.*.*"      # publish only on version tags like v1.2.3
      - "!v*.*.*-*"   # exclude anything with a pre-release suffix

concurrency:
  group: gh-pages
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ["22.x"]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm run reload-packages

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test

  build-publish:
    runs-on: ubuntu-latest
    needs: test

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: "22.x"
          cache: npm
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm run reload-packages

      - name: Build ECS Package
        run: npm run build

      - name: Pack (generate .tgz)
        run: npm pack

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: npm-package
          path: "*.tgz"
          if-no-files-found: error
          retention-days: 7

      - name: Publish to npm
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  deploy-docs:
    runs-on: ubuntu-latest
    needs: build-publish

    permissions:
      contents: write

    steps:
      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Checkout tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install mkdocs + plugins
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-docs.txt

      - name: Configure git for mike
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Deploy versioned docs
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          export PDF_LINK="/archetype-ecs-lib/${VERSION}/assets/document.pdf"
          export EDIT_URI="blob/v${VERSION}/"
          export ENABLE_PDF_EXPORT=1
          mike deploy --push --update-aliases "${VERSION}" latest
          mike set-default --push latest
